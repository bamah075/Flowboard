<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowBoard — My Projects</title>
<style>
:root {
  color-scheme: light;
  --orange: #F06A35;
  --orange-light: #fff5f2;
  --purple: #6366f1;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --bg: #f3f4f6;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
  --text2: #6b7280;
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── HEADER ── */
.header {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 58px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 6px rgba(0,0,0,.06);
}
.logo { display: flex; align-items: center; gap: 9px; }
.logo-icon { width: 30px; height: 30px; }
.logo-text {
  font-size: 18px; font-weight: 900;
  background: linear-gradient(135deg, #6366f1 0%, #F06A35 60%, #f59e0b 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.btn { border: none; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 700; padding: 8px 16px; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--orange); color: #fff; }
.btn-primary:hover { background: #d95f2c; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(240,106,53,.3); }
.btn-ghost { background: #f3f4f6; color: var(--text2); }
.btn-ghost:hover { background: #e5e7eb; color: var(--text); }

/* ── MAIN ── */
.main { max-width: 1100px; margin: 0 auto; padding: 36px 24px 60px; }

.section-title {
  font-size: 13px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .6px; color: var(--text2); margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── STATS ROW ── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 36px; }
.stat-card {
  background: var(--card); border-radius: var(--radius);
  padding: 18px 20px; border: 1px solid var(--border);
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.stat-value { font-size: 28px; font-weight: 900; margin-bottom: 4px; }
.stat-label { font-size: 12px; color: var(--text2); font-weight: 600; }

/* ── PROJECT GRID ── */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 40px; }

.project-card {
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  overflow: hidden; cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  display: flex; flex-direction: column;
  text-decoration: none; color: inherit;
}
.project-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.1); }

.project-banner { height: 6px; }
.project-body { padding: 18px 18px 14px; flex: 1; }
.project-name { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
.project-meta { font-size: 12px; color: var(--text2); margin-bottom: 14px; }

.project-cols { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
.col-chip { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: #f3f4f6; color: var(--text2); }

.project-progress { }
.prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.prog-row span { font-size: 11px; color: var(--text2); font-weight: 600; }
.prog-row strong { font-size: 12px; color: var(--text); font-weight: 800; }
.prog-bar { height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }

.project-footer {
  padding: 12px 18px;
  border-top: 1px solid #f3f4f6;
  display: flex; align-items: center; justify-content: space-between;
}
.project-badges { display: flex; gap: 6px; }
.badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; }
.badge-cards { background: #ede9fe; color: #6d28d9; }
.badge-live  { background: #d1fae5; color: #065f46; }
.project-open {
  font-size: 12px; font-weight: 700; color: var(--orange);
  background: var(--orange-light); border: none; border-radius: 7px;
  padding: 5px 12px; cursor: pointer; transition: all .1s;
}
.project-open:hover { background: #fde8de; }

/* DELETE BTN */
.project-delete {
  background: none; border: none; cursor: pointer;
  font-size: 14px; color: #d1d5db; padding: 3px;
  border-radius: 5px; transition: all .1s;
}
.project-delete:hover { color: var(--red); background: #fee2e2; }

/* ── TEMPLATES ── */
.templates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

.template-card {
  background: var(--card); border-radius: var(--radius);
  border: 2px dashed var(--border); padding: 20px 18px;
  cursor: pointer; transition: all .15s;
  display: flex; flex-direction: column; gap: 10px;
}
.template-card:hover { border-color: var(--orange); background: var(--orange-light); transform: translateY(-2px); }
.template-icon { font-size: 28px; }
.template-name { font-size: 14px; font-weight: 800; }
.template-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
.template-cols { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
.template-col-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── NEW PROJECT MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 500; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px; width: 460px; box-shadow: 0 25px 60px rgba(0,0,0,.2); overflow: hidden; }
.modal-head { padding: 20px 22px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-head h2 { font-size: 16px; font-weight: 800; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #9ca3af; line-height: 1; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
.field label { font-size: 11px; font-weight: 800; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 5px; }
.field input, .field select {
  width: 100%; border: 1.5px solid var(--border); border-radius: 9px;
  padding: 9px 12px; font-size: 13px; font-family: inherit; outline: none;
  transition: border-color .15s;
}
.field input:focus, .field select:focus { border-color: var(--orange); }
.template-preview { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.preview-col { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 8px; background: #f3f4f6; color: var(--text2); }
.modal-foot { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
.empty-state p { font-size: 14px; margin-top: 8px; }

/* ── TOAST ── */
.toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 700; display: flex; flex-direction: column; gap: 8px; }
.toast { background: #1f2937; color: #fff; font-size: 13px; font-weight: 600; padding: 10px 16px; border-radius: 9px; box-shadow: 0 4px 16px rgba(0,0,0,.25); animation: slideUp .2s ease; pointer-events: none; }
@keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>

// ══════════════════════════════════════════════
// STORAGE — projects stored as individual keys
// ══════════════════════════════════════════════
const INDEX_KEY = 'fb_projects_index';

function getIndex() {
  try { return JSON.parse(localStorage.getItem(INDEX_KEY) || '[]'); } catch { return []; }
}
function saveIndex(idx) { localStorage.setItem(INDEX_KEY, JSON.stringify(idx)); }

function getProject(id) {
  try { return JSON.parse(localStorage.getItem('fb_proj_' + id)); } catch { return null; }
}
function saveProject(id, data) { localStorage.setItem('fb_proj_' + id, JSON.stringify(data)); }
function deleteProject(id) {
  localStorage.removeItem('fb_proj_' + id);
  const idx = getIndex().filter(p => p.id !== id);
  saveIndex(idx);
}

function render() {
  const index = getIndex();
  renderStats(index);
  renderProjects(index);
  renderTemplates();
}

function renderStats(index) {
  const allCards = index.flatMap(p => { const proj = getProject(p.id); return proj ? proj.cards : []; });
  const live = allCards.filter(c => {
    const proj = index.find(p => p.id === c._projId);
    // find live col for this project
    return false; // simplified — count progress=100
  });
  const live100 = allCards.filter(c => c.progress === 100).length;
  const pct = allCards.length ? Math.round(live100 / allCards.length * 100) : 0;
  document.getElementById('stat-projects').textContent = index.length;
  document.getElementById('stat-cards').textContent = allCards.length;
  document.getElementById('stat-live').textContent = live100;
  document.getElementById('stat-pct').textContent = pct + '%';
}

function renderProjects(index) {
  const grid = document.getElementById('projectsGrid');
  if (index.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div style="font-size:40px">📋</div>
      <p>No projects yet — create one from a template below.</p>
    </div>`;
    return;

    if (!proj) return '';
    const total = proj.cards.length;
    const live = proj.cards.filter(c => c.progress === 100).length;
    const pct = total ? Math.round(live / total * 100) : 0;
    const progColor = pct >= 80 ? '#10b981' : pct >= 40 ? '#F06A35' : '#6366f1';
    const liveColName = proj.columns[proj.columns.length - 1]?.name || 'Done';

    return `
    <div class="project-card" onclick="openBoard('${p.id}')">
      <div class="project-banner" style="background:linear-gradient(90deg,${proj.columns[0]?.color||'#9ca3af'},${proj.columns[Math.floor(proj.columns.length/2)]?.color||'#F06A35'},${proj.columns[proj.columns.length-1]?.color||'#10b981'})"></div>
      <div class="project-body">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div class="project-name">${escHtml(proj.name)}</div>
          <button class="project-delete" onclick="event.stopPropagation();confirmDelete('${p.id}')" title="Delete project">🗑</button>
        </div>
        <div class="project-meta">Updated ${updated} · ${proj.columns.length} columns</div>
        <div class="project-cols">
          ${proj.columns.map(c => `<span class="col-chip" style="background:${c.color}22;color:${c.color}">${c.name}</span>`).join('')}
        </div>
        <div class="project-progress">
          <div class="prog-row">
            <span>${live}/${total} ${liveColName}</span>
            <strong>${pct}%</strong>
          </div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${progColor}"></div></div>
        </div>
      </div>
      <div class="project-footer">
        <div class="project-badges">
          <span class="badge badge-cards">${total} cards</span>
          <span class="badge badge-live">${live} done</span>
        </div>
        <button class="project-open" onclick="event.stopPropagation();openBoard('${p.id}')">Open Board →</button>
      </div>
    </div>`;
  }).join('');
}

function renderTemplates() {
  document.getElementById('templatesGrid').innerHTML = TEMPLATES.map(t => `
    <div class="template-card" onclick="openNewProject('${t.id}')">
      <div class="template-icon">${t.name.split(' ')[0]}</div>
      <div>
        <div class="template-name">${t.name.slice(2)}</div>
        <div class="template-desc">${t.desc}</div>
      </div>
      <div class="template-cols">
        ${t.columns.map(c => `<div class="template-col-dot" style="background:${c.color}" title="${c.name}"></div>`).join('')}
      </div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════
// OPEN BOARD
// ══════════════════════════════════════════════
function openBoard(projectId) {
  // Encode project ID into URL and navigate to board page
  window.location.href = BOARD_PAGE + '?project=' + encodeURIComponent(projectId);
}

// ══════════════════════════════════════════════
// NEW PROJECT MODAL
// ══════════════════════════════════════════════
function openNewProject(templateId) {
  const sel = document.getElementById('f-template');
  sel.innerHTML = TEMPLATES.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
  if (templateId) sel.value = templateId;
  document.getElementById('f-name').value = '';
  previewTemplate();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 60);
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function previewTemplate() {
  const tid = document.getElementById('f-template').value;
  const tmpl = TEMPLATES.find(t => t.id === tid);
  if (!tmpl) return;
  document.getElementById('templatePreview').innerHTML =
    tmpl.columns.map(c => `<div class="preview-col" style="background:${c.color}22;color:${c.color}">${c.name}</div>`).join('');
}

function createProject() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const tid = document.getElementById('f-template').value;
  const tmpl = TEMPLATES.find(t => t.id === tid) || TEMPLATES[0];

  const id = 'proj_' + Date.now();
  const now = new Date().toISOString();
  let nextCardId = 1;

  const proj = {
    name,
    columns: JSON.parse(JSON.stringify(tmpl.columns)),
    cards: tmpl.cards.map(c => ({ id: nextCardId++, ...c })),
  };

  saveProject(id, proj);
  const idx = getIndex();
  idx.unshift({ id, name, created: now, updated: now });
  saveIndex(idx);

  closeModal();
  render();
  toast(`✅ "${name}" created`);

  // Navigate straight to the board
  setTimeout(() => openBoard(id), 600);
}

// ══════════════════════════════════════════════
// DELETE
// ══════════════════════════════════════════════
function confirmDelete(id) {
  const proj = getProject(id);
  if (!proj) return;
  if (!confirm(`Delete "${proj.name}"? This cannot be undone.`)) return;
  deleteProject(id);
  render();
  toast('Project deleted');
}

// ══════════════════════════════════════════════
// IMPORT
// ══════════════════════════════════════════════
function importProject() { document.getElementById('fileInput').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.columns || !data.cards) { alert('Invalid FlowBoard JSON file.'); return; }
      const id = 'proj_' + Date.now();
      const now = new Date().toISOString();
      saveProject(id, { name: data.projectName || 'Imported Board', columns: data.columns, cards: data.cards });
      const idx = getIndex();
      idx.unshift({ id, name: data.projectName || 'Imported Board', created: now, updated: now });
      saveIndex(idx);
      render();
      toast('Board imported ✓');
    } catch { alert('Could not parse file.'); }
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
  wrap.appendChild(el); setTimeout(() => el.remove(), 2200);
}

document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
// Seed a demo project if nothing exists yet
if (getIndex().length === 0) {
  const id = 'proj_demo';
  const tmpl = TEMPLATES[0];
  saveProject(id, {
    name: 'Website Build (Demo)',
    columns: JSON.parse(JSON.stringify(tmpl.columns)),
    cards: tmpl.cards.map((c, i) => ({ id: i+1, ...c })),
  });
  saveIndex([{ id, name: 'Website Build (Demo)', created: new Date().toISOString(), updated: new Date().toISOString() }]);
}

render();
</script>
</body>
</html>
